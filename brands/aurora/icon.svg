<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aurora">
  <defs>
    <linearGradient id="dawn" x1="40" y1="24" x2="216" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#232554"/>
      <stop offset="0.44" stop-color="#5b3f9d"/>
      <stop offset="1" stop-color="#e89a4b"/>
    </linearGradient>
    <linearGradient id="sun" x1="128" y1="96" x2="128" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3d0"/>
      <stop offset="1" stop-color="#ffd27a"/>
    </linearGradient>
    <clipPath id="badge"><rect x="0" y="0" width="256" height="256" rx="60"/></clipPath>
  </defs>

  <!-- Dawn squircle (full-bleed: image is trimmed by construction) -->
  <rect x="0" y="0" width="256" height="256" rx="60" fill="url(#dawn)"/>

  <g clip-path="url(#badge)">
    <!-- Sun glow -->
    <circle cx="128" cy="170" r="78" fill="#ffd27a" opacity="0.18"/>
    <!-- Rays -->
    <g stroke="url(#sun)" stroke-width="9" stroke-linecap="round" opacity="0.95">
      <line x1="128" y1="60" x2="128" y2="86"/>
      <line x1="70" y1="78" x2="84" y2="100"/>
      <line x1="186" y1="78" x2="172" y2="100"/>
      <line x1="44" y1="128" x2="70" y2="128"/>
      <line x1="212" y1="128" x2="186" y2="128"/>
    </g>
    <!-- Rising sun (semicircle over the horizon) -->
    <path d="M76 170 a52 52 0 0 1 104 0 Z" fill="url(#sun)"/>
    <!-- Horizon -->
    <rect x="40" y="170" width="176" height="11" rx="5.5" fill="#fff7e6" opacity="0.95"/>
  </g>
</svg>
