<svg width="600" height="180" viewBox="0 0 600 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aurora">
  <defs>
    <linearGradient id="dawn" x1="20" y1="20" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#232554"/>
      <stop offset="0.44" stop-color="#5b3f9d"/>
      <stop offset="1" stop-color="#e89a4b"/>
    </linearGradient>
    <linearGradient id="word" x1="190" y1="60" x2="560" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5b3f9d"/>
      <stop offset="1" stop-color="#e89a4b"/>
    </linearGradient>
    <linearGradient id="sun" x1="90" y1="60" x2="90" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff3d0"/>
      <stop offset="1" stop-color="#ffd27a"/>
    </linearGradient>
    <clipPath id="badge"><circle cx="90" cy="90" r="66"/></clipPath>
  </defs>

  <!-- Sunmark -->
  <circle cx="90" cy="90" r="66" fill="url(#dawn)"/>
  <g clip-path="url(#badge)">
    <g stroke="url(#sun)" stroke-width="6.5" stroke-linecap="round" opacity="0.95">
      <line x1="90" y1="40" x2="90" y2="56"/>
      <line x1="54" y1="52" x2="63" y2="66"/>
      <line x1="126" y1="52" x2="117" y2="66"/>
      <line x1="38" y1="88" x2="54" y2="88"/>
      <line x1="142" y1="88" x2="126" y2="88"/>
    </g>
    <path d="M58 112 a32 32 0 0 1 64 0 Z" fill="url(#sun)"/>
    <rect x="36" y="112" width="108" height="8" rx="4" fill="#fff7e6" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="186" y="122" font-family="'Trebuchet MS','Segoe UI',Verdana,sans-serif" font-size="104" font-weight="700" letter-spacing="-3" fill="url(#word)">aurora</text>
</svg>
