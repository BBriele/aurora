<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aurora — Alarms (responsive mockup)</title>
<style>
  /* Aurora-like theme tokens (approssimano il tema HA dark Material You) */
  :root {
    --bg: #111016;
    --surface: #1b1a22;
    --surface-2: #232230;
    --text: #e9e7f0;
    --dim: #9a96ab;
    --divider: #2c2a38;
    --accent: #b9a7ff;
    --accent-2: #e89a4b;
    --on-accent: #211a35;
    --grad: linear-gradient(120deg, #b9a7ff, #e89a4b);
    --grad-soft: linear-gradient(120deg, rgba(185,167,255,.14), rgba(232,154,75,.10));
    --radius: 18px;
    --shadow: 0 8px 30px rgba(0,0,0,.35);
    font-family: "Segoe UI", Roboto, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); }

  /* live breakpoint badge so puoi capire dove sei mentre ridimensioni */
  .bp {
    position: fixed; right: 12px; bottom: 12px; z-index: 50;
    background: var(--surface-2); border: 1px solid var(--divider);
    color: var(--dim); font-size: 12px; font-weight: 700;
    padding: 6px 10px; border-radius: 999px; box-shadow: var(--shadow);
  }
  .bp b { color: var(--accent); }

  /* top bar + tabs (come il pannello attuale) */
  .bar { display: flex; align-items: center; gap: 14px; padding: 18px 22px 6px; }
  .brand { font-size: 1.5rem; display: flex; align-items: center; gap: 8px; font-weight: 700; }
  .grad-text { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .who { margin-left: auto; display: flex; align-items: center; gap: 8px; color: var(--dim); font-weight: 600; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--grad); color: #fff; display: grid; place-items: center; font-weight: 700; font-size: .85rem; }
  .tabs { display: flex; gap: 6px; padding: 8px 22px 0; flex-wrap: wrap; }
  .tab { border: none; cursor: pointer; font: inherit; font-weight: 600; padding: 10px 16px; border-radius: 999px; color: var(--dim); background: transparent; }
  .tab.on { color: var(--text); background: var(--surface); box-shadow: var(--shadow); }

  /* contenitore responsivo: stretto su mobile, largo su desktop */
  .content {
    width: 100%;
    max-width: 760px;            /* mobile / default: larghezza-lettura */
    margin: 0 auto;
    padding: 18px 18px 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  @media (min-width: 900px)  { .content { max-width: 1000px; } }
  @media (min-width: 1200px) { .content { max-width: 1200px; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-radius: var(--radius);
    padding: 18px 20px;
  }
  .card-head { display: flex; align-items: center; margin-bottom: 14px; }
  .card-head h3 { margin: 0; font-size: 1.05rem; letter-spacing: .01em; }
  .card-head .spacer { flex: 1; }
  .btn { border: none; cursor: pointer; font: inherit; font-weight: 600; padding: 9px 16px; border-radius: 999px; }
  .btn.primary { background: var(--grad); color: var(--on-accent); }

  /* ===== Schedule 7 giorni ===== */
  .week { display: grid; gap: 10px; grid-template-columns: repeat(7, 1fr); }
  .day {
    background: var(--grad-soft);
    border: 1px solid var(--divider);
    border-radius: 14px;
    padding: 10px 10px 12px;
    min-height: 96px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .day.today { border-color: color-mix(in srgb, var(--accent) 55%, transparent); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent) inset; }
  .day .dh { display: flex; align-items: baseline; gap: 6px; }
  .day .dow { font-weight: 700; font-size: .8rem; letter-spacing: .04em; text-transform: uppercase; color: var(--dim); }
  .day.today .dow { color: var(--accent); }
  .day .dnum { font-weight: 700; font-size: 1rem; }
  .chips { display: flex; flex-direction: column; gap: 6px; }
  .chip {
    align-self: flex-start;
    background: color-mix(in srgb, var(--accent) 16%, transparent);
    color: var(--accent);
    font-weight: 700; font-size: .82rem;
    padding: 3px 9px; border-radius: 8px;
    white-space: nowrap;
  }
  .chip small { color: var(--dim); font-weight: 600; margin-left: 4px; }
  .chip.skip { text-decoration: line-through; color: var(--dim); background: color-mix(in srgb, var(--dim) 14%, transparent); }
  .day .none { color: var(--dim); font-size: 1.1rem; opacity: .5; }

  /* mobile: i 7 giorni diventano righe (giorno -> riga di chip) */
  @media (max-width: 640px) {
    .week { grid-template-columns: 1fr; gap: 8px; }
    .day { flex-direction: row; align-items: center; min-height: 0; padding: 10px 12px; }
    .day .dh { width: 84px; flex: 0 0 auto; flex-direction: column; gap: 0; }
    .chips { flex-direction: row; flex-wrap: wrap; }
  }

  /* ===== Lista sveglie: griglia responsive ===== */
  .list { display: grid; gap: 10px; grid-template-columns: 1fr; }
  @media (min-width: 720px)  { .list { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1100px) { .list { grid-template-columns: repeat(3, 1fr); } }

  .item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: var(--radius);
    background: var(--grad-soft); border: 1px solid var(--divider); cursor: pointer;
  }
  .item.off { opacity: .5; }
  .item .time { font-size: 1.7rem; font-weight: 600; min-width: 78px; font-variant-numeric: tabular-nums; }
  .item .meta { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .item .name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item .when { font-size: .8rem; color: var(--dim); letter-spacing: .06em; }
  .item .sw { margin-left: auto; width: 40px; height: 24px; border-radius: 999px; background: var(--surface-2); position: relative; flex: 0 0 auto; }
  .item:not(.off) .sw { background: var(--grad); }
  .item .sw::after { content: ""; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .15s; }
  .item:not(.off) .sw::after { left: 19px; }
</style>
</head>
<body>
  <div class="bar">
    <div class="brand"><span>🌅</span><span class="grad-text">Aurora</span></div>
    <div class="who"><span>Gabriel</span><div class="avatar">G</div></div>
  </div>
  <div class="tabs">
    <button class="tab on">Sveglie</button>
    <button class="tab">Dispositivi</button>
    <button class="tab">Condivise</button>
  </div>

  <div class="content">
    <!-- Schedule 7 giorni -->
    <section class="card">
      <div class="card-head"><h3>Questa settimana</h3></div>
      <div class="week" id="week"></div>
    </section>

    <!-- Lista sveglie (griglia responsive) -->
    <section class="card">
      <div class="card-head"><h3>Sveglie</h3><span class="spacer"></span><button class="btn primary">+ Nuova</button></div>
      <div class="list" id="list"></div>
    </section>
  </div>

  <div class="bp" id="bp"></div>

<script>
  // --- dati di esempio (stessa forma del modello Alarm) ---
  const alarms = [
    { time: "07:00", label: "Lavoro",    enabled: true,  skip_next: false, repeat: "weekly", weekdays: [0,1,2,3,4] }, // Lun-Ven
    { time: "08:30", label: "Palestra",  enabled: true,  skip_next: true,  repeat: "weekly", weekdays: [1,3] },        // Mar, Gio
    { time: "09:30", label: "Weekend",   enabled: true,  skip_next: false, repeat: "weekly", weekdays: [5,6] },        // Sab, Dom
    { time: "06:45", label: "Volo",      enabled: true,  skip_next: false, repeat: "once",   on_date: offsetDate(2) }, // tra 2 giorni
    { time: "13:00", label: "Medicina",  enabled: false, skip_next: false, repeat: "daily",  weekdays: [] },
  ];
  const DOW = ["Lun","Mar","Mer","Gio","Ven","Sab","Dom"];

  function offsetDate(n){ const d = new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  // indice 0=lunedi (come Aurora) a partire da Date.getDay() (0=domenica)
  function mondayIdx(date){ return (date.getDay() + 6) % 7; }
  function ymd(date){ return date.toISOString().slice(0,10); }

  function firesOn(a, date){
    if(!a.enabled) return false;
    if(a.repeat === "daily") return true;
    if(a.repeat === "weekly") return a.weekdays.includes(mondayIdx(date));
    if(a.repeat === "once") return a.on_date === ymd(date);
    return false;
  }

  // calcola, per ogni alarm, la PRIMA occorrenza nei 7 giorni (per marcare skip_next)
  function firstOccurrence(a){
    for(let i=0;i<14;i++){ const d=new Date(); d.setDate(d.getDate()+i); if(firesOn(a,d)) return ymd(d); }
    return null;
  }

  function buildWeek(){
    const week = document.getElementById("week");
    const firsts = new Map(alarms.map(a => [a, a.skip_next ? firstOccurrence(a) : null]));
    for(let i=0;i<7;i++){
      const d = new Date(); d.setDate(d.getDate()+i);
      const today = i===0;
      const dayAlarms = alarms
        .filter(a => firesOn(a, d))
        .sort((x,y) => x.time.localeCompare(y.time));
      const chips = dayAlarms.map(a => {
        const skip = firsts.get(a) === ymd(d);
        return `<span class="chip ${skip?"skip":""}">${a.time}<small>${a.label}</small></span>`;
      }).join("");
      const el = document.createElement("div");
      el.className = "day" + (today ? " today" : "");
      el.innerHTML =
        `<div class="dh"><span class="dow">${DOW[mondayIdx(d)]}</span><span class="dnum">${d.getDate()}</span></div>`
        + `<div class="chips">${chips || '<span class="none">—</span>'}</div>`;
      week.appendChild(el);
    }
  }

  function buildList(){
    const list = document.getElementById("list");
    const summary = a => a.repeat==="daily" ? "OGNI GIORNO"
      : a.repeat==="once" ? "UNA VOLTA"
      : a.weekdays.map(i=>DOW[i][0]).join(" ");
    alarms.forEach(a => {
      const el = document.createElement("div");
      el.className = "item" + (a.enabled ? "" : " off");
      el.innerHTML =
        `<div class="time">${a.time}</div>`
        + `<div class="meta"><div class="name">${a.label}</div><div class="when">${summary(a)}</div></div>`
        + `<div class="sw"></div>`;
      list.appendChild(el);
    });
  }

  function updateBp(){
    const w = window.innerWidth;
    let name = "mobile";
    if(w >= 1200) name = "desktop xl"; else if(w >= 900) name = "desktop"; else if(w >= 641) name = "tablet";
    document.getElementById("bp").innerHTML = `${w}px · <b>${name}</b>`;
  }

  buildWeek(); buildList(); updateBp();
  window.addEventListener("resize", updateBp);
</script>
</body>
</html>
