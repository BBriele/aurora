# Aurora Integration Quality Scale tracker.
# Target: Platinum (see docs/DECISIONS.md §0). Statuses reflect the current
# scaffold (Phase 0); most user-facing rules complete as later phases land.
rules:
  # --- Bronze ---
  config-flow: done
  test-before-configure:
    status: exempt
    comment: No external device/service to test; setup is local.
  unique-config-entry: done  # single_config_entry: true
  config-flow-test-coverage: todo
  runtime-data: done
  test-before-setup:
    status: exempt
    comment: No external connection to validate at setup.
  appropriate-polling:
    status: exempt
    comment: Push/event-driven coordinator; no polling.
  entity-unique-id: done
  has-entity-name: done
  entity-event-setup: done
  dependency-transparency: done  # no external requirements
  action-setup: done  # services registered in async_setup
  common-modules: done
  docs-installation-instructions: todo
  docs-removal-instructions: todo
  docs-actions: todo
  brands: todo  # submit icon/logo to home-assistant/brands

  # --- Silver ---
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters: todo
  docs-installation-parameters: todo
  entity-unavailable: todo
  integration-owner: done
  log-when-unavailable: todo
  parallel-updates: done  # PARALLEL_UPDATES set in entity platforms
  reauthentication-flow:
    status: exempt
    comment: Purely local; no credentials to re-authenticate.
  test-coverage: todo

  # --- Gold ---
  devices: done
  diagnostics: done
  discovery:
    status: exempt
    comment: Nothing to network-discover; entities are user-bound via roles.
  discovery-update-info:
    status: exempt
    comment: No discovery, so no discovery updates.
  docs-data-update: todo
  docs-examples: todo
  docs-known-limitations: todo
  docs-supported-devices: todo
  docs-supported-functions: todo
  docs-troubleshooting: todo
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Single service device; alarms are records, not devices.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: todo
  entity-translations: done
  exception-translations: todo
  icon-translations: done
  reconfiguration-flow: done
  repair-issues: todo
  stale-devices:
    status: exempt
    comment: Single service device; no per-device staleness.

  # --- Platinum ---
  async-dependency:
    status: exempt
    comment: No external Python dependencies.
  inject-websession:
    status: exempt
    comment: No outbound HTTP client; integration is local.
  strict-typing: todo  # full type hints in place; enable strict CI gate
