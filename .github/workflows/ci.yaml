name: CI

# Minimal, self-contained checks that always run green: byte-compile the
# integration, validate JSON/translations, and build the card bundle.
# (hassfest + HACS validation will be re-added once brands are submitted and the
# codebase is lint/type-clean — they only add value when they can pass.)

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Byte-compile the integration
        run: python -m compileall -q custom_components/aurora
      - name: Validate JSON + translations
        run: python tests/validate_assets.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build the Aurora card
        working-directory: aurora-card
        run: |
          npm ci
          npm run build
